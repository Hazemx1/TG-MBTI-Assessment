        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; }
        input::placeholder { color: rgba(255,255,255,0.35); }
        input:focus, select:focus { outline: 2px solid rgba(99,102,241,0.5); outline-offset: 2px; }
        button:hover:not(:disabled) { transform: translateY(-1px); transition: transform 0.2s; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 50px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media print {
          @page {
            size: A4 portrait;
            margin: 18mm 14mm 22mm 14mm;
          }

          /* Hide app chrome completely when printing */
          .no-print { display: none !important; }

          /* Force light theme for print */
          html, body {
            background: #ffffff !important;
            color: #1a1a2e !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
          }

          /* Make root container light */
          body > div, [dir] {
            background: #ffffff !important;
            color: #1a1a2e !important;
          }

          /* Hide the decorative orbs and app header/footer \u2014 we'll put our own */
          header, footer { display: none !important; }
          [dir] > div[style*="radial-gradient"] { display: none !important; }

          /* Override dark-theme elements that would become invisible on white */
          * {
            color: #1a1a2e !important;
            background-image: none !important;
            background-color: transparent !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            text-shadow: none !important;
          }

          /* But preserve light backgrounds on cards so they remain visually distinct */
          [dir] div[style*="rgba(255,255,255"],
          [dir] div[style*="rgba(16,185,129"],
          [dir] div[style*="rgba(99,102,241"],
          [dir] div[style*="rgba(239,68,68"],
          [dir] div[style*="rgba(251,146,60"],
          [dir] div[style*="rgba(251,191,36"] {
            background-color: #f8f9fc !important;
            border: 1px solid #e5e7eb !important;
          }

          /* Fix the giant gradient-text heading \u2014 force it to solid dark color */
          h1, h2, h3, h4, h5 {
            -webkit-text-fill-color: #1a1a2e !important;
            color: #1a1a2e !important;
            background: none !important;
            -webkit-background-clip: border-box !important;
            background-clip: border-box !important;
          }

          /* Fix the type-letter squares (need to stay dark for readability) */
          [dir] div[style*="background: linear-gradient(180deg"],
          [dir] div[style*="background: linear-gradient(135deg"] {
            background: #1a1a2e !important;
            color: #ffffff !important;
          }
          [dir] div[style*="linear-gradient"] * { color: #ffffff !important; }

          /* SVG radar chart \u2014 make polygon fill visible */
          svg polygon[fill^="url"] { fill: rgba(99,102,241,0.25) !important; }
          svg polygon[stroke] { stroke: #6366f1 !important; }
          svg line { stroke: #d1d5db !important; }
          svg circle { fill: #6366f1 !important; stroke: #ffffff !important; }
          svg text { fill: #1a1a2e !important; }

          /* Progress bars must remain colored for meaning */
          [dir] div[style*="linear-gradient(90deg"] {
            background: #6366f1 !important;
          }

          /* Tab navigation \u2014 hide (irrelevant on paper; show all content sequentially) */
          /* Actually the tabs themselves have no-print already */

          /* Page break hints */
          h2, h3, h4 { page-break-after: avoid; }
          p, li { page-break-inside: avoid; }
          .results-section { page-break-inside: avoid; }

          /* Inline header/footer for print */
          .print-inline-header {
            display: block !important;
            text-align: center;
            margin-bottom: 8mm;
            padding-bottom: 4mm;
            border-bottom: 2px solid #1a1a2e;
            page-break-after: avoid;
          }
          .print-inline-header img {
            height: 14mm;
            display: inline-block;
            vertical-align: middle;
          }
          .print-inline-header .print-header-text {
            display: block;
            margin-top: 3mm;
            font-size: 9pt;
            color: #555 !important;
            letter-spacing: 1.5px;
            text-transform: uppercase;
          }
          .print-inline-footer {
            display: block !important;
            text-align: center;
            margin-top: 8mm;
            padding-top: 4mm;
            border-top: 1px solid #999;
            font-size: 8.5pt;
